name: Build Electron

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: dist/
